<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Website Header</title>
    <style>
        /* General Reset */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
        }

        /* Top Government Bar */
        .top-bar {
            background-color: #800000; /* Maroon */
            color: #ffffff; /* White */
            text-align: center;
            padding: 8px 20px;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        /* Main Header containing Logo and Name */
        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5%;
            background-color: #ffffff;
            border-bottom: 3px solid #FFD700; /* Gold border accent */
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Placeholder for your actual image logo */
        .logo {
            width: 80px;
            height: 80px;
            background-color: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #800000;
            border: 2px solid #800000;
        }

        .school-name {
            font-size: 32px;
            color: #800000; /* Maroon */
            margin: 0;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif; /* Matches the serif style in the image */
            text-transform: uppercase;
        }

        .motto {
            font-style: italic;
            color: #800000;
            font-weight: bold;
            font-size: 16px;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #800000; /* Maroon */
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            display: block;
            color: #ffffff; /* White */
            text-decoration: none;
            padding: 16px 18px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Hover effect changing text to Gold */
        .nav-link:hover {
            background-color: #600000; /* Darker Maroon */
            color: #FFD700; /* Gold */
        }

        /* Dropdown Menu Styling */
        .dropdown-menu {
            display: none;
            position: absolute;
            background-color: #800000; /* Maroon */
            min-width: 220px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.3);
            z-index: 1000;
            top: 100%;
            left: 0;
            border-top: 2px solid #FFD700; /* Gold accent line */
        }

        .dropdown-menu a {
            color: #ffffff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
            border-bottom: 1px solid #600000;
        }

        .dropdown-menu a:hover {
            background-color: #600000;
            color: #FFD700; /* Gold on hover */
        }

        /* Show dropdown on hover */
        .nav-item:hover .dropdown-menu {
            display: block;
        }

        /* Down arrow for dropdown tabs */
        .caret {
            font-size: 10px;
            margin-left: 4px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <!-- Top DepEd Bar -->
    <div class="top-bar">
        Department of Education | Region IV-A CALABARZON | Division of Quezon | Mulanay District 2
    </div>

    <!-- Main Title & Logo Area -->
    <div class="main-header">
        <div class="logo-section">
            <!-- Replace this div with an actual <img> tag for your logo -->
            <div class="logo">LOGO</div>
            <h1 class="school-name">Ilayang Yuni Elementary School</h1>
        </div>
        <div class="motto">
            "Sa Ilayang Yuni, Lahat RESPONSIBLE"
        </div>
    </div>

    <!-- Main Navigation Tabs -->
    <nav class="navbar">
        <div class="nav-item"><a href="#" class="nav-link">HOME</a></div>
        <div class="nav-item"><a href="#" class="nav-link">ABOUT US</a></div>
        <div class="nav-item"><a href="#" class="nav-link">ANNOUNCEMENTS</a></div>
        <div class="nav-item"><a href="#" class="nav-link">EVENTS & ACTIVITIES</a></div>
        
        <div class="nav-item">
            <a href="#" class="nav-link">ENROLLMENT <span class="caret">▼</span></a>
            <div class="dropdown-menu">
                <a href="#">Enrollment Requirements</a>
                <a href="#">Downloadable Forms</a>
            </div>
        </div>

        <div class="nav-item"><a href="#" class="nav-link">SCHOOL PERSONNEL</a></div>
        <div class="nav-item"><a href="#" class="nav-link">SCHOOL MAP</a></div>

        <div class="nav-item">
            <a href="#" class="nav-link">CITIZENS CHARTER <span class="caret">▼</span></a>
            <div class="dropdown-menu">
                <a href="#">Frontline Services</a>
                <a href="#">Request for Records</a>
            </div>
        </div>

        <div class="nav-item">
            <a href="#" class="nav-link">LIQUIDATION <span class="caret">▼</span></a>
            <div class="dropdown-menu">
                <a href="#">MOOE Reports</a>
                <a href="#">Canteen Operations</a>
            </div>
        </div>

        <div class="nav-item">
            <a href="#" class="nav-link">PPAS <span class="caret">▼</span></a>
            <div class="dropdown-menu">
                <a href="#">Programs</a>
                <a href="#">Infrastructure Projects</a>
            </div>
        </div>

        <div class="nav-item">
            <a href="#" class="nav-link">ORGANIZATIONS <span class="caret">▼</span></a>
            <div class="dropdown-menu">
                <a href="#">Supreme Pupil Government (SPG)</a>
                <a href="#">General PTA</a>
            </div>
        </div>

        <div class="nav-item"><a href="#" class="nav-link">LINKS</a></div>
    </nav>

</body>
</html>
